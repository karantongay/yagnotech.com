<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="YagnoTech flame mark">
  <defs>
    <linearGradient id="yt-flame" x1="128" y1="26" x2="128" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6C45F"/>
      <stop offset="0.48" stop-color="#E58E2A"/>
      <stop offset="1" stop-color="#BE5A14"/>
    </linearGradient>
    <linearGradient id="yt-flame-edge" x1="72" y1="60" x2="190" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE3A0" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#8A4310" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="yt-core" x1="128" y1="92" x2="128" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF3D8"/>
    </linearGradient>
    <filter id="yt-glow" x="38" y="6" width="180" height="244" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#E58E2A" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Outer flame: silhouette that reads as a single ascending tongue -->
  <g filter="url(#yt-glow)">
    <path d="M128 26C143 76 177 95 185 140C191 175 170 212 128 228C86 212 65 175 71 140C79 95 113 76 128 26Z"
          fill="url(#yt-flame)"/>
    <path d="M128 26C143 76 177 95 185 140C191 175 170 212 128 228C86 212 65 175 71 140C79 95 113 76 128 26Z"
          stroke="url(#yt-flame-edge)" stroke-width="2.5" stroke-opacity="0.7"/>
  </g>

  <!-- Luminous Y core: the disciplined offering within the flame -->
  <path d="M104 104L128 138L152 104M128 138V182"
        stroke="url(#yt-core)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Spark / aspiration node at the apex -->
  <circle cx="128" cy="58" r="6" fill="#FFF3D8"/>
</svg>
