<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to YagnoTech</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1.5rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      max-width: 560px;
      width: 90%;
    }

    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo span {
      color: #38bdf8;
    }

    .tagline {
      margin-top: 0.75rem;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .divider {
      margin: 2rem auto;
      width: 60px;
      height: 3px;
      background: #38bdf8;
      border-radius: 2px;
    }

    .message {
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.8);
    }

    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.4rem 1.1rem;
      background: #38bdf8;
      color: #0f2027;
      font-weight: 700;
      font-size: 0.85rem;
      border-radius: 9999px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Yagno<span>Tech</span></div>
    <p class="tagline">Technology. Simplified.</p>
    <div class="divider"></div>
    <p class="message">
      Welcome to <strong>yagnotech.com</strong>!<br />
      Something exciting is on its way. Stay tuned.
    </p>
    <span class="badge">Coming Soon</span>
  </div>
</body>
</html>
